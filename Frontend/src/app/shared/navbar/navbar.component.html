<nav class="navbar">
	<div class="brand">
		<a routerLink="/">Request Explorer</a>
	</div>
	<ul class="links">
		<li><a routerLink="/home" routerLinkActive="active">Home</a></li>
		<li><a routerLink="/tester" routerLinkActive="active">API Tester</a></li>
		<li class="dropdown">
			<span>Analytics ▾</span>
			<ul class="menu">
				<li><a routerLink="/analytics/general">General</a></li>
				<li><a routerLink="/analytics/api">API</a></li>
			</ul>
		</li>
		<li><a routerLink="/history" routerLinkActive="active">History</a></li>
		<li><a routerLink="/about" routerLinkActive="active">About</a></li>
		<li><a routerLink="/contact" routerLinkActive="active">Contact</a></li>
	</ul>
	<div class="auth">
		@if (!authService.isAuthenticated()) {
			<a routerLink="/login" class="btn">Login</a>
			<a routerLink="/register" class="btn primary">Sign up</a>
		} @else {
			<span class="user-info">{{ authService.currentUser()?.email }}</span>
			<button (click)="logout()" class="btn">Logout</button>
		}
	</div>
</nav>
